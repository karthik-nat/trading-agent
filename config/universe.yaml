# =============================================================================
# universe.yaml — SEED test universe (Phase 0)
# -----------------------------------------------------------------------------
# A small list of liquid US large-caps used to exercise the data pipeline.
# This is NOT the tradeable universe — the §3 tradeability gate (min_price,
# min_avg_dollar_volume, min_market_cap, earnings blackout, etc.) lives in
# rulebook.yaml and is applied in code in Phase 1 (src/data/universe.py).
# Sectors are hand-tagged here only so later phases can exercise the §6 sector
# cap; the authoritative sector source at runtime is rulebook.yaml
# `universe.sector_source`.
# =============================================================================

# Broad-market index used as an indicator only (regime/market filter). Never held.
market_index: "^GSPC"

seed_universe:
